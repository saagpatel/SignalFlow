name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "22"
  PNPM_VERSION: "10.31.0"

jobs:
  verify-core:
    name: Verify core app (macOS)
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend lint
        run: pnpm lint

      - name: Frontend tests
        run: pnpm test -- --run

      - name: Frontend build
        run: pnpm build

      - name: Backend tests
        working-directory: src-tauri
        run: cargo test

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Rust lint
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  tauri-bundle-smoke:
    name: Tauri bundle smoke (macOS)
    runs-on: macos-latest
    needs: verify-core
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS Tauri bundle
        run: pnpm tauri build

      - name: Package macOS app archive
        run: pnpm release:pack-macos-app

      - name: Validate macOS artifacts
        run: pnpm release:validate-macos

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: signalflow-ci-macos-dmg
          if-no-files-found: error
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload app archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: signalflow-ci-macos-app
          if-no-files-found: error
          path: src-tauri/target/release/bundle/macos/*.app.tar.gz
