name: Release Bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "22"
  PNPM_VERSION: "10.31.0"

jobs:
  verify-release:
    name: Verify release inputs (macOS)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend lint
        run: pnpm lint

      - name: Frontend tests
        run: pnpm test -- --run

      - name: Frontend build
        run: pnpm build

      - name: Backend tests
        working-directory: src-tauri
        run: cargo test

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Rust lint
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Capture bundle report
        run: pnpm perf:bundle

      - name: Measure build time
        run: pnpm perf:build

      - name: Check asset budgets
        run: pnpm perf:assets

      - name: Run memory smoke
        run: pnpm perf:memory

  bundle-macos:
    name: Build macOS release artifacts
    runs-on: macos-latest
    needs: verify-release
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri application
        run: pnpm tauri build

      - name: Package macOS app archive
        run: pnpm release:pack-macos-app

      - name: Prepare release notes artifact
        run: pnpm release:notes

      - name: Generate DMG checksums
        run: pnpm release:checksum

      - name: Validate macOS artifacts
        run: pnpm release:validate-macos

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signalflow-macos-release
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/SHA256SUMS.txt
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/release-notes/RELEASE_NOTES.md

      - name: Document release blockers
        run: |
          {
            echo "## External credential blockers"
            echo "- This workflow currently builds unsigned macOS artifacts and uploads them as workflow artifacts."
            echo "- Signed and notarized macOS distribution still requires Apple Developer credentials in repository secrets or runner keychain configuration."
            echo "- Typical Apple signing inputs are: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID."
            echo "- GitHub Release publishing remains manual by design for v1.0.0; use these uploaded artifacts plus SHA256SUMS.txt for the release draft."
          } >> "$GITHUB_STEP_SUMMARY"
