name: quality-gates

on:
  pull_request:
  push:
    branches: [master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Policy checks
        run: node scripts/ci/require-tests-and-docs.mjs

      - name: Frontend and docs verification
        run: |
          pnpm git:guard:all
          pnpm lint
          pnpm typecheck
          pnpm test -- --run
          pnpm test:coverage
          pnpm build
          pnpm docs:check

      - name: Diff coverage
        if: github.event_name == 'pull_request'
        env:
          DIFF_BASE: origin/${{ github.base_ref }}
        run: |
          python -m pip install --upgrade pip diff-cover
          diff-cover coverage/lcov.info --compare-branch="$DIFF_BASE" --fail-under=90

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            playwright-report/
            test-results/
            coverage/

  quality-gates:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Confirm quality gate suite
        run: echo "quality-gates suite passed"
